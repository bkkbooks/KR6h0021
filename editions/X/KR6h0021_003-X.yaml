body:
  text: 一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力一切諸佛愍念眾生為說慈悲地藏懺法今當歸命一切諸佛南無釋迦牟尼佛南無無量壽尊佛南無光明功德佛南無無憂德佛南無那羅延佛南無功德華佛南無蓮華光遊戲神通佛南無德念佛南無善名稱功德佛南無紅𦦨帝幢王佛南無善游步功德佛南無寶華遊步佛南無寶蓮華善住娑羅樹王佛南無鬬戰勝佛南無善遊步佛南無周匝莊嚴功德佛南無文殊師利菩薩南無大行普賢菩薩南無觀世音菩薩南無棄陰葢菩薩南無無盡意菩薩南無虗空藏菩薩南無地藏王菩薩禮諸佛已次復懺悔上來已懺惑業報竟三障清淨三道停酸今當懺悔鬼畜人道三種餘愆是諸眾生皆於過去無量劫時非毀律儀破菩薩戒污涅槃性壞菩提根乘十習因造無量罪不孝父母違逆師長恣殺盜妄美己惡人奸淫邪污造種種業報入無間受苦萬端歷劫燒然受諸苦劇獄報雖盡還墮鬼倫仍有十種鬼趣出生若本淫習貪色為因男女相逐放佚成風罪在獄中以經塵劫出生人間遇風成魃殺稿田禾燒空雨氣枯涸江河欲習致焚於神廟淫心累溺於子亡如斯一類名旱魃鬼貪財為因盜竊成習侵公益私不捨悋心損人利己如是等業報畢出獄得升人間依然鬼道附托金銀玉帛或依草木成形金精戲於竇義樹神擊於曹瞞如斯一類名為怪鬼若其慢習貪傲為因發於相恃高舉陵人自強傲物身謝命終洎報地獄已經沙劫情畢想升依然幽隱遇氣成形慠罔不息常抱饑虗縱遇水時還能害己五百年不聞漿水之名千萬劫常受饑餒之苦如斯一類名曰餓鬼貪習憶業由貪交衝發于相忤懷憶不忘造心忿恨展轉為嗔瞋火燒空然成地獄情報罪畢想升人間遇衰為患猶依忿氣毒厲傷寒傅屍骨蒸乃至生無能以滅賊死有感而威神如斯一類名厲志鬼若本詐習性自依奸憑虗架妄由調相牽引起惡業招地獄愆沉潛億劫受苦無窮情畢想升暫生人間遇畜成形詐言禍福狐狸猪狗鸚鵝鵠禽公冶長於縲絏裴生脫於羈縻如斯一類名為魅鬼若本誑習貪妄成愆多謀陰覆利養自求罔冐權英令人情昧凡其幹略自落彀中發於相妄互為是非因遭地獄業報情枯想升人世遇幽成形還依臥寐䆿畏其人黃粱炊於頃刻槐柯吏於終朝如斯一類名魘寐鬼若其夙習貪恨為由懷惡造業結怨成讐獄報累己以經多劫情畢想升暫處人間遇蠱成形龜蛇怪異災咎逆知幽隱纏綿餘習之報智感夢於明王身難脫於鼎鑊如斯一類名蠱毒鬼若本明習覆心成業內外正典異見邪生雖事經緯出生常反撥無因果違拒戒常墮在獄中情畢想升方為鬼道遇明成形日月薄蝕山澤妖神黃石符於秘術青曩妙於玄箴如斯一類名魍魎鬼由因本習貪成為緣誑偽之業枉狎巫舉枉措直率己欺人擾害無辜證述其罪而茲造惡以報無間情畢想升出生人間伶伻役卒運石搬沙塞㵎填河鞭山入海錢王射於水鬼秦始䇿於山靈如斯一類名役使鬼由因宿習貪黨成羣攻發人之隱惡樹黨己之兇倫斯其造罪獄治情枯想升人世傳送成形如世扶箕巫祝童戲卜算吉凶休咎禍福指顧陰陽九流雖示於趨避然皆墮落於偏邪如斯一類名傳送鬼如是十類鬼人皆由迷真逐妄幻作幻成枉搆是非俱從情想洎受獄愆還依鬼趣業火煎燒報滋逮盡餘波未竭墮十類中故我今日恭對三寶地藏慈尊一一披陳重重懺悔過去十習一屏消除未來鬼身永不復受脫幽沉之苦趣隨所願以遨遊念念修行心心善道同得法忽乃至菩提永絕情源長泛覺海我與眾等重復志誠五體投地歸命敬禮一切諸佛南無釋迦牟尼佛南無阿彌陀佛南無一切智成就佛南無大光明佛南無蓮華清淨目佛南無定光明佛南無智慧光明佛南無功德光明佛南無福德光明佛南無袈裟幢佛南無師子吼自在王佛南無覺華自在王佛南無師子奮迅具足萬行佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無無盡意菩薩南無財首菩薩南無本尊地藏王菩薩禮諸佛已次復懺悔向來以懺鬼道罪竟今當懺悔畜道愆尤所以然者獄治情枯鬼懲想竭則情與想二妄俱空方出人間便為畜道與元負人怨對相逢酬儻夙債亦有十種旁生異類而怪物之鬼物銷形滅來生人間多為梟類未亡餘習貪塊為兒啣蟲作子一槩異怪是等畜生我今為其發露懺悔往習消除乘地藏之慈力脫苦類於梟禽究竟本元得心自在若風魃之鬼風消鬼滅來生人間多為咎徵羣知儉眾鼠鳴荒𪄲鴹致水石燕應風鶴舞多旱虹架物消其類匪一總曰咎徵乖今發露願出迷倫得法自在隨願超登若其媚鬼畜死物亡來生人間詐習成形鬼仍諂媚所依既滅畜受狐身貓貍太屬乞濟依人諂媚千求統名狐畜乘今懺悔感佛恩消宿世習因後不受果若其蠱類毒銷形亡來生人間還名畜類蚖蛇蝮蝎潛龍虎豹螫蠆於人如是怨習展轉難忘乘某等之懺力脫異類之匪身漸漸契真不沈惑妄又復懺悔衰癘之鬼脫生人間名為蛔類瞋習所使鬼為衰癘八人身中還受畜生復托身中為蛔蟯屬瞋習剛愎畜報柔蟲因果迭逢翻覆間爾如是等習願懺消除乘佛慈恩即得心樂受氣之鬼氣消物故來生人間都為貪類貪慢是因饑虗其果身供庖厨故名食類𦠄膚充饋骨肉給餐鱗甲毛禽鷄鵝魚鼈牛羊猪屬枉罹刀砧慢習餘波沉淪畜報如是等眾為其懺悔所有枉業罪悉冰清若綿幽之鬼魂滅幽消來生人間多為服類鬼受幽纏仍為魘魅幽默既消顯為服類駝驢牛馬蠶繭貂裘幽隱不明故墮異屬誑習是因故儔服果承今懺力滌昔因緣仗地藏之洪恩獲天倫之極樂靜心綿密照性無為到菩提鄉出生死海次復懺悔和精之鬼見習夙因今為畜類節序猶知春來紫燕夏至黃鶯秋返霜鴻而庠序冬藏雪以徘徊蛤鵲交形蜻蜓異質逐時變化隨類易生若夫明靈之鬼明滅魂消生于人世多為休徵因乘枉習果托明生以為驅使鬼道業盡畜報休徵祥瑞將至預有徵明鳳出周興麟生聖產林鵲報乎人喜蜘蛛埀乎禧祺如是一類盡曰休徵我今頂禮懺法為其洗滌宿因頓復明心旋歸性地永依聖教不墮輪迴妙契無為入心地藏依人之鬼人亡鬼滅生在世間多為馴類訟習之因鬼招傳送今已為畜報質黠慧頻伽美韻鸚鵡巧言鵠能誦佛獼猴學人雖號靈禽為人所畜然上十類皆因妄情冰結習業劇招枉逐三塗無窮火業情水燒枯酬償夙債尚作畜生因人而畜故號畜生形旁行旁故曰旁生皆由妄業之所招感於心地秘藏總是空華於空華體上寧存實果是故今來某與眾等先懺鬼道次悔畜生企伊同悟十習妄因即生同證一乘實果又復應知如上鬼畜各償先債報滿之時復還人道就人道中亦有十種差別若過去世曾負其財或役其力酬足自停於先世時或殺彼命或食其肉如是乃至經微塵劫相食相誅猶如井輪互為高下盡未來時莫能止遏除斯懺悔解脫何期是故某等志心禮拜為其發露求哀懺謝宿業既淨便升人道夫人道生者葢因常戒為正因緣今三途盡亦得為人而有愚者言惡業苦盡自得為人何須修善植福方作人天善路如其想念罪真不輕然人道在世總報雖同智愚逈異故有貴賤十種分別今者三途報盡故曰得昇乃是餘業旁受誠非正因緣生是故經云標名參合眾等當知彼梟倫者酬足復形生人道中參合頑類然因貪物鬼托怪形畜生土梟今復人身其性顓蒙參合頑嚚心亡德義志豈存仁不孝不忠無廉無恥任意喧囂貪習之故彼咎徵者酬足復形生人道中參合蒙癡宿習貪淫鬼受魃精上為畜生災咎之應業盡復人猶為愚癡著淫欲故不脩餘善故招愚鈍知善不從教誨違戾背條反律如醉如癡故曰愚魯彼狐倫者酬足復形生人道中參合凶狠獄治詐習鬼托媚倫類八旁生狐狸所攝今為人趣凶狠交參剛愎自用不受人諫自專自用真賤庸人彼毒蠱者報畢復形生於人道參合傭類怨習是因蠱毒為果旁生畜道蝮蛇是形今復人身襍充伻賤為人驅使自歷饑寒是昔餘殃今招卑賤彼蛔倫者生人道中參合微類貪𭿍為習鬼報衰癘蟯蛔成畜柔弱為人人不齒錄不自寒暑憑他飽餒剛愎翻柔因果迭奏彼食倫者酬償自足亦為復形生人道中參合柔倫貪慢習因餓鬼感果空腹高心無實體性畜報食彝為人柔弱葢因貢高而招一懦強弱歷然誰肯信者君彼服倫酬足復形出生人道參合勞屬虗妄誑因鬼為幽魘畜承服忍人受勤劬役力艱辛百工技藝諸務雜儔寒暑策驅故曰勞類復應倫者酬足為人參合文明因從見習鬼落和精魍魎報終畜召應物參合人道綽有文聲非正因緣故名參合若其休徵亦復為人參合明倫枉習因由明靈果報驅馳役使無暫停休畜招黠慧人受聰明考古尋今毫無差舛彼循倫者酬足復人參於達類由因訟習鬼報依人符祝傳詞呪彰禍福畜報夙因人達窮通榮辱不驚猶知進退如辟穀於深山或乘桴於滄海如是一類故曰達倫然上十種皆過去劫未聞佛法不假僧脩任十習之妄因造十種之劇業幻受泥犁情竭想升還為鬼道鬼道報盡復還畜生畜道報終旋復人身雖復人身十種逈異皆由妄執顛倒十使為緣致造十惡汝負我命我負汝財相生相殺妄作妄為不遇佛乘未聞善法遠離僧脩偏任習因於塵勞中法爾流轉寧免佛言深可憐愍故我今者遵三寶之垂教依地藏之圓經發等慈之願力懺同分之習因始從三惑六根以至十惡五逆與夫三道輪迴三界險趣升沉往復未獲出離仰冀三寶聖賢俯賜證明懺悔使某等夙障消除頓空三惑三觀圓明三諦頓顯十身悉備於今生十界同𮍣於常樂隨諸菩薩斷惑證真懺悔已歸命禮諸佛及地藏菩薩摩訶薩南無本師釋迦牟尼佛南無阿彌陀佛南無彌勒尊佛南無過去七佛南無十方十佛南無三十五佛南無五十三佛南無百七十佛南無莊嚴劫千佛南無賢劫千佛南無星宿劫千佛南無三世諸佛南無地藏經中一切諸佛南無十方諸大菩薩南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無無盡意菩薩南無虗空藏菩薩南無無能勝菩薩南無無邊身菩薩南無地藏王菩薩禮諸佛已次復懺悔上來已懺三障及與十惡六根交報鬼畜人道種種餘報乘斯懺力淨盡消除惑業報果永不復為願令六道四生各各具足功德智慧神通願方同與菩薩隨心自在地藏本願經云若未來世比丘比丘尼善男子善女人童男童女諸不自在者聞我名號見我形像燒香散華供養世尊禮拜懺悔者不唯滅除先世罪因苦果即其現生之中獲得二十種勝妙善利一者天龍擁護疾病不生二者善果日增福衍餘慶三者深植信根華敷果實四者衣食豐足不招貧乏五者災難消除身心舒暢六者離水火災居處常寧七者盜賊不侵烽煙殄滅八者人見欽敬遵道行仁九者酬償夙負安樂身心十者先亡得度奕葉芳馨十一女轉男身不生邊鄙十二報滿生天志行十善十三宿命智通敏脩正教十四所求皆得遂意圓成十五眷屬康寧憂虞屏息十六諸枉消忘履止貞吉十七寤寐神安身心猛利十八自他壽命躓蹶永離十九菩提不退道果漸成二十等行慈善畢竟成佛故我今日率諸淨信歸依三寶地藏慈尊證知我心遂其成就如上種種悉皆應現又復無始以來至於今日由愛見故內計我人外逐惡友懈怠懶惰不能精進脩行隨喜善法事理沉疑故今發心隨喜至善慶己慶人慶己則於理無違慶人則造事脩心循理能契始本二覺造事能融境智十如故我今日發心隨喜十方一切諸眾生二乘有學及無學一切如來與菩薩所有功德皆隨喜隨喜已歸命禮三寶及地藏慈尊起禮一拜又復歸依十方三寶誓生願生一切菩薩哀憐攝受隨喜心已次當勸請十方三寶十地聖人常住在世是諸聖賢教化我等利益羣品故我今日至心勸請十方所有世間燈最初成就菩提者惟願久住剎塵劫利樂一切諸眾生勸請已同上又復歸依如是三寶上來懺悔隨喜勸請已竟今當發回向心何以故爾一切眾生不能優遊解脫者皆由著於果報所以不能捨離凡有一毫之善能回向菩提則所脩善業不復繫著輪迴事絕經云脩行迴向成大福果我今所修微善亦當迴向兼勸一切莫復貪著所有懺悔及與隨喜勸請因緣皆悉迴向性相佛法及僧伽二諦融通三昧印如是智慧功德海迴向眾生及佛道迴向已如前又復歸依三寶聖賢既發迴向心竟今當發無上菩提願心經云有願無行其願必虗有行無願其行亦妄虗妄行願何能尅果故我今日宜發大願以願輔行行助願成行願圓脩契真妙果以此願行功德因緣各各具足智慧神通諸佛行願從心滿足又願生生世世在在處處以佛慈悲諸眾生三塗之苦與諸眾生二善之樂究竟菩提成無上道又願生生世世在在處處令一切眾生所有無明煩惱令斷無餘致顯三諦又願生生世世在在處處咸令一切眾生從聞思脩一切法門無不深詣又願生生世世在在處處令諸眾生信解行證無上聖道開示悟入佛之知見究竟常樂我淨顯明心地秘藏證入其中又願生生世世在在處處應生國土每值有道國王儲君宰職興顯佛法尊敬大乘獎導沙門廣行教化又願生生世世在在處處令某甲等內外三術一念備足三觀圓明三諦頓顯究極心地竟登秘藏又願生生世世在在處處乘菩薩力誓生娑婆及與他方上弘佛道下化眾生究竟圓常等歸寂滅上來懺悔已至發願廣大如法性究竟等虗空窮未來際滿菩提願同佛菩薩入秘密藏讚地藏懺法三卷周圓恩資九有與人天福利廣無邊功德攸玄惟願永流傳南無地藏王菩薩三稱
