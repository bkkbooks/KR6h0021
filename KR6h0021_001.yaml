body:
  text: 嚴淨壇場楊枝淨水遍灑三千性空八德利人天餓鬼免針咽滅罪除愆火𦦨化紅蓮南無清涼地菩薩摩訶薩三稱南無觀自在菩薩三稱衆持大悲等呪心經畢舉摩訶般若波羅密多云云唵捺摩巴葛瓦帝阿巴囉密沓阿優哩阿納蘇必儞實執沓牒左囉宰也怛塔哿達也阿囉訶帝三藥三不達也怛儞也塔唵薩哩巴桑斯葛哩叭哩述沓達囉馬帝哿哿捺桑馬兀哿帝莎巴瓦比述帝馬喝捺也叭哩瓦哩莎喝願將以此勝功德祝讚皇帝萬萬歲聖明君諸國來朝位南無無量壽祝讚皇帝萬萬歲再云以此經呪功德回向護法龍天三界嶽瀆靈聰守護道場真宰祈福保安平善莊嚴無上菩提普願法界衆生共入毗盧性海香讚爐香乍爇法界𫎇熏諸佛海會悉遙聞隨處結祥雲誠意方殷諸佛現全身香雲蓋菩薩摩訶薩三稱普賢王菩薩象駕光臨有一菩薩結跏趺坐名曰普賢身白玉色五十種光光五十種色以為項光身諸毛孔流出金光其金光端無量化佛諸化菩薩以為眷屬安庠徐步雨大寶華至行者前其象開口於象牙上諸池玉女鼓樂絃歌其聲微妙讚歎大乘一實之道行者見已歡喜敬禮復更讀誦甚深經典遍禮十方無量諸佛禮多寶佛塔及釋迦牟尼并禮普賢諸大菩薩發是誓願若我宿福應見普賢願尊者遍吉示我色身普賢王菩薩摩訶薩三聲一切恭敬一心頂禮十方法界常住佛一心頂禮十方法界常住法一心頂禮十方法界常住僧是諸衆等各各胡跪嚴持香華如法供養願此香華遍十方以為微妙光明臺諸天音樂天寶香諸天肴膳天寶衣不可思議妙法塵一一塵出一切塵一一塵出一切法旋轉無礙互莊嚴遍至十方三寶前十方法界三寶前皆有我身修供養一一皆悉遍法界彼彼無雜無障礙盡未來際作佛事普熏法界諸衆生蒙熏皆發菩提心同入無生證佛智願此香華雲遍滿十方界供養一切佛尊法諸菩薩緣覺聲聞衆及一切天仙以起光明臺過於無邊界無邊佛土中受用作佛事普熏諸衆生皆發菩提心南無寶曇華菩薩摩訶薩三稱釋迦如來證明禮懺宣疏通誠悉如常主者引衆梵聲稱讚以此稱讚三寶功德修行無上大乘善根奉福上界天龍八部梵王帝釋護世四王三十三天閻羅五道六齋八王行利鬼神天醫使者護法星乾各及眷屬僧伽藍內護正法者祝延當今皇帝統御萬年太子千秋金枝玉葉郡邑宰輔土境士民師僧父母善惡知識造寺檀那十方信施廣及法界一切衆生藉此善根平等熏修功德智慧種種莊嚴此世他生同登樂地舉讚佛偈佛智真如清淨月無緣寂照朗虗空斯心盡處是菩提是故志心歸命禮啓運慈悲地藏懺法今當歸命三世諸佛南無過去毗婆尸佛南無尸棄佛南無毗舍浮佛南無拘留孫佛南無拘那含牟尼佛南無迦葉佛南無本師釋迦牟尼佛南無當來彌勒尊佛南無地藏王菩薩無上甚深微妙法百千萬劫難遭遇我今見聞得受持願解如來真實義建此地藏菩薩慈悲懺法者為令一切衆生發歡喜心成善法益而興懺法為令一切衆生破除煩惱成對治益而見懺法亦令一切衆生從戒定慧自聞思修成五根力得生善益而修懺法復令一切衆生修世出世業證第一義八理益故而行懺法良以法界一切衆生皆由不如實知真如法一不守真常動轉業現妄起無明境界為緣覺心凝寂旋乖法性相續遍計取執自他展轉相因善惡果報無記三性苦樂迭奏如谷隨聲臨鏡隨影遂有凡倫生起諸相升沉輪替羈鎖難離法性元明於是汩沒故曰三界惟心萬法惟識悟惟心之妙理罪福同是空華迷法性之圓明善惡無非實果所以輪回三有遠涅槃山漩澓四生入生死海波波造業岌岌為愆垢如山積易塞真空惑似冰堅難分俗諦機感我佛應入娑婆地藏慈尊雲臻大集垂形月印降迹星羅運同體之慈仁濟有情於苦海垂無緣之悲仰度六道於愛河蕩滌塵緣湔除惑垢以是因緣懺摩爰啓奈何某等妄境迷心幻緣翳識自從曠劫報入娑婆因無明而順業愚分真俗親疏稟有識以違仁孰辨賢惡可否縱酒昏迷恆無智慧縱欲敗度每有愚癡恃己聰明陵人傲物依他起見自實愆疣所有之過惡無窮招報之年期不既若不懺滌於身心必致罪彌於宇宙計招業報定入三塗盡未來時何由解脫故某等今日率諸淨信廣具香華普設供養結水月之壇儀行懺摩之法事求哀悔過發露披陳已作之罪悉冀消滅未作之𠎝不敢復造是故歸依十方盡虗空界一切諸佛一拜歸依十方盡虗空界一切尊法一拜歸依十方盡虗空界一切聖僧一拜次復志誠歸敬啓請梵王帝釋護世四王天龍八部業道冥王應現我前證知懺悔是故某等宜各志誠五體投地如泰山崩歸命頂禮一切諸佛南無本師釋迦牟尼佛南無阿彌陀佛南無彌勒尊佛南無師子奮迅具足萬行佛南無覺華定自在王佛南無一切智成就佛南無清淨蓮華目佛南無袈裟幢佛南無師子吼自在力王佛南無功德雲佛南無文殊師利菩薩南無普賢願王菩薩南無財首菩薩南無阿逸多菩薩南無定自在王菩薩南無觀世音菩薩南無本尊地藏王菩薩禮諸佛已次復懺悔某等從無始以來至於今日皆由不信三世諸佛是歸依主不信五時妙法是甘露食不信六和聖賢是導迷師所以輪回三界隨順妄習往復四生逆生死流迷淪苦海無解脫期而我等雖復粗知三寶曾未發心修行尤與一切衆生內計我我外逐妄緣稱三毒根隨六塵境遍造五逆十惡廣興殺盜淫欺乃至廣開八萬四千諸塵牢門障閉八萬四千諸般若道三善路截四惡道通無始至今尚在凡夫故大覺世尊地藏菩薩雲集忉利深起哀憐報本埀慈教行懺悔夫論懺悔者必先懺悔三毒五逆元首消除業無生起則六根十惡欲造無由塵勞門閉妙行斯前勝境冥通菩提可逮故某等今日生增上心立堅固行以為滅罪方便則三毒六根及緣生諸法自然應念消忘修行自在是故今日求哀懺悔然行懺者當知惑業各有元由使我流轉三毒是咎於是先懺三毒惑因次悔惡業苦果何以故爾苦因業有業為惑成生起連環三世不息生起元由仍歸意地意妄起故身口業隨而此意業復有三名一曰慳貪二號瞋恚三是疑癡由疑癡故頓起結使故知百千煩惱咸根三毒能令衆生常住三途然有三途者皆由三毒滋潤故招生死輪回若諸衆生縱脫泥犁得還人道復受貧窮孤露之身以酬慳貪不信佛故若有衆生餓鬼罪畢得還人倫復受凶佷頑鈍之軀以酬不信大乘之報若有衆生脫旁生道生人倫中愚癡無智如醉如癡以酬不隨衆中修學之故以是因緣郵傳三道雖其受報千差察其本源各從意地意業既有如斯苦報豈得安然而不懺悔然此三種俱名為毒者蓋能滅一切衆生法身慧命故亦名此煩惱以為無明昏亂能以昏煩之法惱亂衆生故亦名此煩惱以為染污無知能蓋蘊真如清淨理故亦名此煩惱以為怨賊能滅衆生五分法身與功德法財故亦名此煩惱以為愛河汩沒衆生於生死海不能到涅槃岸故亦名此煩惱以為牢獄能桎梏衆生不得解脫自在故如是煩惱牽連六道捆縛四生造業無邊輪回不絶皆由此煩惱以為賊媒嫁禍千差娶苦萬別是故某等今日志誠求哀懺悔如是三毒應念屏除又念某等無始來今身既人間受報雖復修行善法而於一止二觀三因四緣五蘊六蔽七趣八倒九有十境十一遍使十二重城十六知見十八界二十隨二十五我六十二見八十八見惑九十一思惟百八枝末塵勞八萬四千煩惱各隨本數俱係無明晝夜熾然前逼識浪局迫心源開諸漏海湧沒真如惱亂聖賢六道四生迷惑三空障蔽六度如是煩惱彌覆覺明果報嬰心身難逃逭是故今日哀懇慈尊受我殷勤志心懺悔煩惱結習一念冰清聞思修業行解圓成仰願十方三寶十輪地藏能仁以本慈力以本悲力誓願神通之力攝受我等求哀發露一切煩惱皆悉伏斷行願精明菩提果熟一切生因永不復受相與志信等一痛切五體投地如大山崩虔恭運想十方頂禮一切諸佛南無釋迦牟尼佛南無阿彌陀佛南無彌勒尊佛南無無邊身佛南無寶勝佛南無波頭摩勝佛南無寶相佛南無師子吼佛南無淨月佛南無大通山王佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無定自在王菩薩南無無盡意菩薩南無大勢至菩薩南無地藏王菩薩禮諸佛已次復懺悔夫懺悔者蓋論改往修來自新悔故然現業易制修行可達宿習難除必假懺法今夫行人好正而固邪欲潔而偏染不教而自能不願而自為稱然若有驅策而不能已者宿習之所使也德隆而行鄙行善而身凶多障多歉數病數惱綿然若有機緘而不能釋者結業之所召也茲非一生一劫之緣乃是無始以來念念受熏種子異熟現行牽成故非懺悔莫能釋之然欲懺已往之愆尤必藉當來之行業以致入聖超凡咸從斯舉當從佛語如法修行而先須知止正心誠意明德知止定靜則諸惡不作正心安慮則衆善必行誠意格物則已往之愆尤可釋明德自新則將來之福慧可期莫疑小善以為無福小善不作何以成聖莫疑小惡以為便行小惡若積足以滅身各宜努力同懺愆尤經云罪性本空由心妄造而福體無基皆從心得罪既從空以妄造福亦自心以覓址而某甲等既未離於凡地觸向都迷事非資於聖典懺悔何崇是故今日起勇猛心發精勤心懺悔夙愆然懺悔功德力不思議何以故天上五衰相現懺之仍復天倫人間弒逆報熟悔之復還人道能令行人得安隱樂若能努力投誠志心發露三障愆由自然消滅是故某等求哀懺悔又復自從無始生死以來因無明故果報奚窮由煩惱性造十惡業耽染愛著貪欲奮馳結色流愛精欲煩惱瞋恚交爭忿恨自他懷害無過殺業煩惱性識愚癡不分善惡惟色惟心惛憒煩惱我及我所陵人傲物盜竊名器上慢煩惱疑惑聖教邪正不知進止難決猶豫煩惱撥無因果著斷著常永墮見坑戒禁煩惱不識緣假身受心法執計四倒迷於三世誤人誤己常在三途邊見煩惱親近惡友疏遠善人不理正知身見煩惱是二十隨纏縛三界遍受四生展轉輪回無有罷期今某甲等發露求哀皆悉懺悔又復於中隨煩惱性無慚無愧不畏鬼神不知因果造罪無邊曾未懺悔又復慳貪己物吝不與人見他財寶枉取貪求奢誕五情不懷六念放逸身心不攝煩惱心行弊惡道違清規偏行慘刻不忍煩惱是法怠墮非理精明悠悠緩縱不勤煩惱靜慮躁動進止沉凝縱心自恣不勗煩惱觸境生意不辨是非掉舉失念無知煩惱瞋譏苦樂毀譽利衰逐情奔逸矯亂煩惱阿侫時態諂曲紏紛覆藏隱善不直心煩惱易忿難悅嫉妬良善諂誑愛憍害毒煩惱面是背非乖經違典非理蠆人循情屈己謂合時宜乃至苦集滅道世出世間十二因緣順觀生起反觀還滅輪轉煩惱致於塵沙障乎化道無知止於中途搆起六粗動轉三細皆由煩惱性惡蓋覆心地祕藏如是惑因幻造業果如我今日求哀懺悔乘今精進之功及諸佛神通之力十使永息三毒頓忘三惑煩惱令盡無餘三途解脫於身心一念無忘於智地開七覺華證十地果於佛菩薩同獲無生廣及自他入心地藏懺悔發願已歸命禮常住三寶讚心地祕藏煩惱紏纏因之身口意相連造罪廣無邊稽首金仙衆惡一時蠲南無地藏王菩薩三稱出懺如常儀式
