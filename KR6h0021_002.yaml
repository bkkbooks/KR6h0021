body:
  text: 悲愍為莖智慧葉三昧為鬚解脫敷菩薩蜂王食甘露我今敬禮佛蓮華一切諸佛愍念衆生為說慈悲地藏懺法今當歸命一切諸佛南無釋迦牟尼佛南無阿彌陀佛南無當來彌勒佛南無山王佛南無智勝佛南無淨名王佛南無智成就佛南無無上佛南無妙聲佛南無滿月佛南無月面佛南無三世諸佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無普廣菩薩南無虗空藏菩薩南無金剛藏菩薩南無地藏王菩薩禮諸佛已次復懺悔上來略懺煩惱障竟惑障清淨業因不繼業無偶匹造罪何由次當懺悔業障業相雖多有漏無漏黑白撿之收無不盡然佛言五戒儒說五常常戒雖殊體本元一克己復仁慈心不殺見利思義不與不取非禮不視寧許奸邪言可翻覆信則斷金嗜酒滅身妄言敗德堅持常戒人道無虧此五善業同名有漏以不能超越同居界故復有勝倫不惟慳己以物慧他不特不殺性嗜好生雖未離淫進止有節讚美十善歎護一乘攝散精勤修未到定果感地居主小千界報似勝人皆歸有漏更復有人厭欲苦粗欣色淨妙修四種定感十八種天雖伏煩惱尚未斷滅色漏未除復有深機厭色牢籠盡識歸空觀空想滅以無所處滅盡頂天壽經沙劫復墜輪回未獲無生亦名有漏如向若人若天雖修善業不出輪回俱名黑業若修禪觀依止觀空始五停心總別相境身受心法次第觀成行三十七品之助道觀一十六行之正修破八十八之見使得證見道除九十一之思惟身證無生心境寂滅以正遍空離五蘊山出生死海居涅槃頂於法無為不得度生未名菩薩若於中乘因緣體法從無明緣行乃至憂悲苦惱自無明滅憂悲苦惱亦滅如是逆順體法惑寂智滅疾證無為病在無機並收小果若夫菩薩名大乘者自身未度先度衆生發僧那於始心終大悲而赴難廣行六度功越三祇修漏無漏之慧業獲生無生之慈悲開佛見知證極自性合本有之靈明悟心地之祕藏心佛衆生同歸三德而已奈某等所以不能解脫者皆由性識無定逐境生心染習結業淨習結果為善為惡曾未暫停輪回五道遍歷四生動經塵劫迷惑障難如魚遊網將逝長流脫或暫出又復遇網但因妄見妄習發生郵傳三界旅邸四生出沒不停自招劇咎皆由十種妄習不得解脫云何為十一者淫習交接二者貪習交吸三者慢習交陵四者瞋習交衝五者詐習交誘六者誑習交誣七者怨習交嫌八者見習交明九者枉習交加十者訟習交喧由斯十習造十惡果皆由六根種種搆造致地獄報六根交受以是因緣故當懺悔第一先懺淫習者男女根境交接相磨研磨不止搖動根塵汝憐我色我愛汝心日月歲深轉復尫瘵眠夢不安身肢疼痛𢡖悽不樂臨欲令終父母妻努洞傷死別亡者神識晝夜長行去無遮止即身應受業報鐵床經劫受苦無量無邊是故諸佛色目行淫同名欲火菩薩見淫如避火坑我與衆生無始來今而元不知遠離色欲避淫火坑於內外境男女身分迷色迷心廣造醜業自破淨戒毀他性遮耻他門戶壞賢節名不男不女五種非人或比丘尼亦嗜欲習造地獄因受苦無量故於今日恭對聖賢剖露披陳求哀懺悔願十方佛地藏能仁傾甘露水湔除罪垢使我無始欲習化為尸羅淨緣究竟菩提成就戒德登歡喜地永截輪回第二懺悔貪習者貪習業現發於相吸吸引不止滋蔓貪根猶如磁石鐵針同倫知足之人雖貧亦樂不知足者富更愈求殊不知富招極禍喪家失命眷屬分離更有三緣不求自至或遭水火無妄橫羅或生逆子弛法凋殘消瘦家園苦等剜肉縱能善禦耗散無期是故諸佛色目多求同名貪水菩薩見貪如避瘴海我與衆等無始來今而全不知多求多苦不離瘴海輕重寶物利祿公私枉騁馳求相吸惡取劫奪剽掠橫毒良民於三寶財混亂雜用托公私益偷越關津盜竊銖錙欺瞞圭合以粗易好以短換長巧計百端希望毫𨤲益我貪心貪得無厭至受輪回故我今日懇佛哀憐受我懺悔所有貪業皆悉消除乘斯禮懺功德增伊檀度焚熏以此勝因滿波羅蜜究獲淨心登離垢地第三懺悔慢習者慢習交陵發於相恃馳流不息騰逸奔波無明海濶積水貪深如人口舌自相綿味因而水生彼此相鼓纍劫成仇相攻辨駁訟及經生死有血湖灰河熱沙洋銅灌口等報是故諸佛色目我慢同名癡海菩薩見慢如避巨溺某及衆等無始至今而渾不知癡慢水溺隨世八風波浪千疊漂生死海沉慢見河張憍慢帆入無明流泳洋沉淪無有出日又復或恃種性憍慢餘人或以聰明輕欺後學乃至未得謂得未證謂證妄竊道器訛述後生如是等慢不可具說恭對三寶悉皆懺悔願某靜慮圓成忍波羅蜜越慢溺海登涅槃山發智光明入一乘地第四懺悔瞋習者瞋習交衝發於相忤忤結不息心熱發火鑄氣為金鬬生惡業生有刀輪劍戟斧鉞鋸鎗是生衝冤殺氣飛動瞋習相擊則有宮劓斬刖銼刺捶擊等報是故諸佛色目瞋恚同名刀劒菩薩見瞋如避誅戮我與衆等無始來今而曾不知瞋恚惡習攬斯交衝師瞋弟子弟子瞋師父母六親姻戚故舊鄰里鄉黨更互相衝紊然較計誓不和諧不念自無慧力彼有福緣妄爭高下競結冤讐自有愆尤多方文飾他鮮過失廣為簸揚如是瞋恚無量無邊故我今者恭對聖賢所有瞋習悉皆懺悔精進止觀成波羅蜜𦦨慧增明證無上道廣與衆生同登四地第五懺悔詐習者詐習交誘發於相掉相嘲不住引起煩惱如水浸田稗莠生長荒蕪良稼善穀不生詐習相延是非空搆矯設異議罔冒豪雄彈壓彼此欺詐自他曲媚時宜相加枉直則有杻械枷鎖杖笞棒撾等報是故諸佛色目奸僞同名讒賊菩薩見詐如畏豺狼我與衆等無始至今而宛不知詐僞豺狼讒人如是反趂夙習遍起諂伎衙仗豪門顛覆良第不任忠信偏詐無辜遞相誘引非作非為捨於八正邪命邪求亡身喪命俱係詐緣如是等因造無量罪終招苦果無由出離故我今日恭對聖賢求哀懺悔惟願三寶地藏慈尊哀憐攝受證我披陳上來五習等一消除三昧總持入那伽定禪波羅蜜舉念具足究竟菩提發無礙辨樂說無盡廣接有情出輪回海同登彼岸過難勝地證佛無為現前衆等相與志心等一痛切歸命敬禮一切諸佛南無釋迦牟尼佛南無金剛不壞佛南無金寶光佛南無金龍尊佛南無精進軍佛南無精進喜佛南無寶火光佛南無寶月光佛南無現無愚佛南無寶月佛南無文殊師利菩薩南無普賢菩薩南無師子幡菩薩南無師子作菩薩南無虗空藏菩薩南無觀世音菩薩南無地藏王菩薩摩訶薩禮諸佛已次復懺悔第六誑習交誣誣妄不止心欺造奸則有塵穢屎尿污言如塵隨風各無所見沉溺騰躍飛墜漂淪苦報等事是故諸佛色目欺誑如同劫賊菩薩見誑猶踐蛇虺我與衆等從無始來至於今日而尤不知欺誑蛇虺曾未遠離或隨誑習心計異端口發誣言見言不見聞言不聞知言不知作言不作面是背非哄騙無知背恩負義而親不親誑妄說法瞞昧愚倫言己則高登聖位毀他則墮在凡夫而不知自入見坑牽人入獄將招苦報無量無邊若不懺悔焉可滅除是故今日恭對諸佛一一披陳求哀懺悔從今已往真實修行智慧現前滿波羅蜜真語實語不誑不欺精進菩提悟心地藏第七怨習交嫌發於銜恨由忿為先懷惡不怠結怨為性不能含忍熱惱奮馳則有投辭控訴訟及公庭故即飛石投礰匣貯車檻甕盛囊幞如陰毒人懷抱畜惡報有投擲擒捉擊剚拋撮無間等事是故諸佛色目怨恨同違害鬼菩薩見冤如飲鴆酒我及衆生無始至今而實不知冤恨鴆酒醉無明家怨習交嫌相銜相恨結怨結讐或父母邊忤逆不孝兄弟姊妹姑姨伯叔眷屬良朋師僧共住違教弗訓如是嫌恨未得懺除故我今日仰對三寶地藏慈尊鑒我生來所有冤仇悉皆消滅未結冤業不敢復作智慧遠行應念成就方便波羅蜜真實證其中具足神力應化十方度諸有漏到涅槃山第八見習交明發於相違相違不止便懷戒禁邪悟諸見相反出生如是即有主吏官曹辨正文詞考鞫邪僞如行路人往來相見是習相交報有勘問權衡推案察訪對鏡照明承認允伏善惡判官及諸童子手執文券辨㭊謠訛鞫訊等事是故諸佛色目邪見同名見坑菩薩見諸虗妄遍計遍執如臨毒壑我與衆等無始來今而竟不知邪見交明真似毒壑於諸諦理妄計博度執我我所起諸邪見著斷著常著空著有戒取見取隨事生心撥無因果妄舉邪緣謂是正道更有迷明投崖拔髮嘗穢臥薪捨身誤為無益苦行乃至命終直墮無間如是見業曾或有之故我今日恭對十方調御歸命地藏慈尊懺悔邪見邪思頃成正知正見某與衆等正心不動八地高登願波羅蜜一生成就等與含生咸階聖果俱悟無為同歸祕藏第九枉習者枉習交加發於欺誑由欺謗故內無實心譽人以善惟恐不至於天毀人以惡尤慮不及於淵譏毀良善貶斥沙門志不忠貞心存虗僞如是故有合山磕石碾磑耕磨如讒賊人逼枉賢良枉習相排以有捺捶按蹙衡度諸事是故諸佛色目怨謗同名讒虎菩薩見枉如遭霹𮦷我與衆等無始來今而更不知枉習欺謗的如讒虎或以枉法誣陷親朋讒害師僧及餘人輩心無慈忍𢡖刻無辜鰥寡孤獨橫羅奇殃致死含冤難可由欣如是怨謗業相無邊故我今者正意誠心恭對聖筵發露懺悔所有枉習悉使冰消行願成就力波羅蜜不興惡念更造三途永攝人天當修善慧引導有情同歸正覺第十懺悔訟習者訟習交喧發於藏覆不能隱惡揚善而反嫉善妬能發宣隱惡使彼難容唯恐我不勝人人便勝我意氣剛愎旁若無鄰自作之罪不使伊聞他違常儀恚類宣布如是故有鑒證分明不自藏影如人日中毛髮自露故有業鏡火珠披露宿業對驗等事是故諸佛同名陰賊色目覆藏菩薩見覆如戴高山履於巨海我與衆等自從無始迄於今生而終不知訟習妄緣藏護瑕玼包含過失言己則無德不歸說他則何惡不有氣質憍慠目空無人喧及公私言詞巧搆經年纍世無有羆期又復發喧私忿彰露惡形不顧身命何憐家室心心相續意在前人念念無窮唯圖快己如是因緣皆由掉舉致成重喧展轉相應會無暫輟故我今日恭對世尊地藏菩薩始從淫習終至訟喧是十習因造百千業及至地獄六受交報及與三途無不由之一一披陳重重懺悔願佛菩薩傾大甘露沃滅習因慧𦦨光明爍破癡暗行願成就禪觀精深智波羅蜜皆悉圓滿法雲遍界普蔭羣機法雨滋沾同明道種修菩薩之願力證無上之菩提究竟圓成十地妙行相與志心等一痛切五體投地如泰山崩歸命頂禮一切諸佛南無釋迦牟尼佛南無無量壽佛南無無垢佛南無離垢佛南無勇施佛南無清淨佛南無清淨施佛南無娑留那佛南無水天佛南無堅德佛南無旃檀功德佛南無無量掬光佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無金剛藏菩薩南無無盡意菩薩南無定自在王菩薩南無地藏王菩薩禮諸佛已次復懺悔向來已懺煩惱障竟次悔業障今當懺悔報障經云假使百千劫善惡業不亡因緣會遇時果報還自受故知習因業果招感不差所以世尊而示金鎗馬麥木槊頭疼以斯令人灼然可式何以知然天上五衰相現懺之即脫猪身人間五逆報熟悔之頓除獄報如斯等類彌遍經文故知懺悔實能滅禍而我凡夫以無道眼安辨因果唯逐六塵勾引六識趂外六境起內六妄遍造十惡迷失一真罪既憑六根而互造苦還依六識以交嬰云何名六一者眼根見業招引惡果斯見交報是人將終先見猛火彌𦦨燒空亡者神識乘煙飛墜入無間中發明二相一是明見遍見惡物刀山岌岌劍樹峨峨亡者神識生無量畏二者暗見寂然不見亡者神識心生恐怖如是見火燒見則為明暗恐怖之色燒聽則為鑊湯融銅振響之聲燒嗅則為黑煙紫霧之氣燒舌則為焦丸鐵糜之味燒身則為石灰爐炭之觸燒心則為星火迸灑鼓扇不息之思如是六種一時交受皆由昔者眼貪幻色今報如是伊不懺謝何有出離而我衆等無始來今或貪幻色心著妄塵玄黃朱紫紅緣鮫綃珍奇寶玩男女容顏馳境好逑起非法想造惡無窮招報如上故於今日恭對三寶地藏慈尊懺悔往業從今日去攝心內照不逐外塵實境現前見淨妙色發真觀智不染習因得如所願滿菩提果二者懺悔聞報由妄聞習招引惡愆此聞業交臨命終時先見波濤沒溺天地亡者神識降注乘流入無間中發明二相一是聞聽聽種種閙精神愗亂二者閉聽寂然無聞幽魄沉沒如是聞波注聞則能為責為詰注見則能為雷為吼注息則能為雨為霧灑諸毒蟲周遍滿身注味則能為膿為血種種雜穢注觸則能為畜為鬼為屎為尿注意則能為雹為霰摧碎心魄如是皆由耳根造業招報而然我與衆等無始來今或為音惑宮商絃管吳歌鄭聲檀板演劇男女優伶妖嬈曲調種種淫詞著境迷心起非法想造罪無邊當報如上故於今日發露披陳求哀懺悔乘此聞熏俾我耳聞法身之妙理仗今懺法即成般若解說之圓音普化有情同歸寂忍三者嗅報交時嗅習業熟其人命終先見毒氣充滿遠近亡者神識從地湧出入無間中發明二相一是通嗅被諸惡氣熏極心擾二者塞嗅氣掩不通悶絶於地如是嗅氣衝息則能為質為履衝見則能為火為炬衝聞則能為沒為溺為洋為沸衝味則能為餒為爽衝觸則能為綻為爛為大肉山有百千蟲咸來咂食衝思則能為灰為瘴為飛砂礫擊碎身體如是嗅業妄報如向我與衆等從無始來至於今日或為鼻惑造衆過愆或貪諸香沉檀降速牛首蘇合麝臍龍腦雞舌馬蹄男女身分姿態嬌柔遍逐幻塵造諸觸業果報熟時將何可免是故今日恭對三寶求哀懺悔從今已去盡未來時安那般那常聞五分法身之香捨生受生永離生死臰穢之氣頓絶塵氛長增法味止觀定慧十境圓明一息無妄潛通十地四者嗜味招引惡果斯味報滿其人命終先見鐵網熾火交煎周幔世界亡者神識下透鐵網倒其頭入無間中發明二相一者吸氣結成寒冰凍冽身肉二者吐氣飛為猛火焦爛骨髓如是味報歷嘗則能為承為忍歷見則能為然金石歷聽則能為刀兵刃歷息則能為大鐵籠彌覆國土歷觸則能為弓為矢為弩為剚歷思則能為飛熱鐵從空雨下頭入足出如是味報皆伊過去不信佛法妄說聖言貪食酒肉感報而然我與衆等無始來今或貪衆生血肉鮮美甘肥妄資四大更增苦本黿染指而興父子之讐咶酒驚心頓起君臣之絶因味造業如是愆尤而我釋子沙門豈得貪味類爾是故今日恭對聖賢盡情懺悔願從今去蔬食自節羶穢遠離禪悅恆餐法喜飽䬸四辨宣揚八音敷奏應機說法慧命延鴻等與含生同超味著五者觸報招引惡果觸業熟時是人將終先見大山四面來合無復出路亡者神識見大鐵城火蛇火狗獅象虎狼牛頭馬面手執䥫矟驅入城門向無間中發明二相一是合觸合山逼體骨肉血潰二者離觸刀劍鋸身心肝屠裂如是合觸則能為道為觀為廳為案歷見則能為燒為然歷聽則能為擊為撞為刺為射歷息則能為括為袋為拷為縛歷嘗則能為耕為鉗為斬為絶歷思則能為墜為飛為煎為炙觸業招報交受如是我與衆等自無始來或貪華綺綿繡繪縠獸毛蠶口毳氎皮靴吳綾蜀錦椒繭狐裘七珍麗服細滑紬裳觸境迷心起非法想如是罪惡無量無邊故於今辰恭對三寶一一披陳求哀懺悔從今已去披忍辱鎧踞法空座入慈悲室普化有情同登覺岸六者意業招報此意業交其人命終先見惡風吹壞國土亡者神識被吹上空乘風旋落入無間中發明二相一是不覺迷極則慌奔走不停二是不迷覺知則苦無量煎燒痛深難忍如是邪思結想則能為方為所結見則能為鐵鏡臺為鑒為證結聽則能為大合石為冰為霜為土為霧結息則為大火車輪火船火檻結嘗為大呌喚為悔為泣結觸則能為大為小為一日中萬死萬生為偃為仰如是六種名曰交報皆是衆生迷妄所起三毒為因十習為緣因緣交遘果報共成則知虗妄造業虗妄受報皆是空華亂翳實性然於理境曾未乖張妄想發生於菩提心恆非本有是故某等既是凡夫寧知聖道或因三毒而起惑或因十習以積愆或從六根而造罪必墮四趣以輪回是故我今求哀懺悔仰願十方三寶十輪地藏慈尊放淨光明照燭我等所有愆尤自他冰釋願乘今之懺力增道損生究竟安樂以金剛智照破無明心地祕藏應念圓成同佛十力四無所畏十八不共無量功德具足六通三達洞明廣宣四辨度盡衆生然後入滅志心懺悔發願已歸命禮常住三寶讚十因妄習造罪如山六根交報墮無間受苦有誰憐頂禮慈顏因果自酬還南無地藏王菩薩三稱
